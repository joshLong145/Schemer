[env]
RUST_LOG = { value = "error", condition = { env_not_set = ["RUST_LOG"] } }
SCHEMER_RUNTIME_PATH = "./packages/runtime/target/release/libschemer_runtime.a"
SCHEMER_TEMP_DIR = "./tmp"

# ==============================================================================
# Core
# ==============================================================================

[tasks.format]
command = "cargo"
args = ["fmt", "--", "--emit=files"]

[tasks.clean]
command = "cargo"
args = ["clean"]

[tasks.build]
command = "cargo"
args = ["build"]

[tasks.build-release]
command = "cargo"
args = ["build", "--release"]

[tasks.test]
command = "cargo"
args = ["test"]

# ==============================================================================
# Runtime
# ==============================================================================

[tasks.build-runtime]
command = "cargo"
args = ["build", "--release"]
cwd = "./packages/runtime"

# ==============================================================================
# Run & Compile
# ==============================================================================

[tasks.repl]
command = "cargo"
args = ["run", "--bin", "schemer"]

[tasks.run]
command = "cargo"
args = ["run", "--bin", "schemer", "--", "${@}"]

[tasks.compile]
command = "cargo"
args = ["run", "--bin", "schemer", "--", "--compile", "${@}", "--output", "./a.out"]

# ==============================================================================
# Debug: IR & Assembly
# ==============================================================================

[tasks.show-ir]
command = "cat"
args = ["${SCHEMER_TEMP_DIR}/program.ssa"]

[tasks.show-asm]
command = "cat"
args = ["${SCHEMER_TEMP_DIR}/program.s"]

[tasks.inspect]
script_runner = "@shell"
script = '''
echo "=== QBE IR ===" && cat ${SCHEMER_TEMP_DIR}/program.ssa
echo "\n=== Assembly ===" && cat ${SCHEMER_TEMP_DIR}/program.s
'''
